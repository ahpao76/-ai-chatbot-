<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTeens | 青少年財金素養學院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <div id="app" class="relative min-h-screen pb-12">
        <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-40">
            <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <i class="fa-solid fa-chart-line text-emerald-400 text-2xl"></i>
                    <span class="text-xl font-bold tracking-wider bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">FinTeens</span>
                </div>
                <div class="text-sm text-slate-400">青少年專屬財金學習平台</div>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-4 mt-8 grid grid-cols-1 md:grid-cols-4 gap-8">
            
            <aside class="md:col-span-1 space-y-6">
                <div class="bg-slate-800/50 border border-slate-700/50 rounded-2xl p-5">
                    <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">主題分類</h3>
                    <div class="space-y-2">
                        <button v-for="cat in categories" :key="cat.id" 
                                @click="currentCategory = cat.id"
                                :class="currentCategory === cat.id ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30' : 'text-slate-400 hover:bg-slate-800 border border-transparent'"
                                class="w-full text-left px-4 py-2.5 rounded-xl text-sm font-medium transition-all">
                            <i :class="cat.icon" class="mr-2"></i> {{ cat.name }}
                        </button>
                    </div>

                    <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mt-6 mb-3">難易度</h3>
                    <div class="flex gap-2">
                        <button v-for="level in ['all', '初階', '進階']" :key="level"
                                @click="currentLevel = level"
                                :class="currentLevel === level ? 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/30' : 'text-slate-400 hover:bg-slate-800 border border-transparent'"
                                class="flex-1 text-center py-2 rounded-xl text-xs font-medium transition-all border">
                            {{ level === 'all' ? '全部' : level }}
                        </button>
                    </div>
                </div>
            </aside>

            <section class="md:col-span-3 space-y-6">
                <h2 class="text-xl font-bold flex items-center">
                    <span class="w-1 h-6 bg-emerald-400 rounded mr-2"></span>
                    精選課程與實戰測驗
                </h2>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div v-for="course in filteredCourses" :key="course.id" 
                         class="bg-slate-800/40 border border-slate-700/60 rounded-2xl p-5 hover:border-slate-600 transition-all flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <span :class="course.level === '初階' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'" class="text-xs px-2.5 py-1 rounded-full font-medium">
                                    {{ course.level }}
                                </span>
                                <span class="text-xs text-slate-500"><i class="fa-regular fa-clock mr-1"></i>{{ course.time }}</span>
                            </div>
                            <h3 class="text-lg font-bold text-slate-100 mb-2">{{ course.title }}</h3>
                            <p class="text-slate-400 text-sm leading-relaxed mb-4">{{ course.desc }}</p>
                        </div>
                        <button @click="startQuiz(course)" class="w-full bg-slate-700 hover:bg-emerald-600 text-white font-medium py-2.5 rounded-xl text-sm transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-graduation-cap"></i> 開始觀看與測驗
                        </button>
                    </div>
                </div>

                <div v-if="activeQuiz" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div class="bg-slate-800 border border-slate-700 rounded-3xl w-full max-w-xl overflow-hidden shadow-2xl">
                        <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                            <div>
                                <span class="text-xs text-emerald-400 font-bold tracking-wider uppercase">隨堂評量</span>
                                <h3 class="text-lg font-bold">{{ activeQuiz.title }}</h3>
                            </div>
                            <button @click="closeQuiz" class="text-slate-400 hover:text-white text-xl"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="p-6 space-y-6 max-h-[60vh] overflow-y-auto no-scrollbar">
                            <div v-for="(q, qIdx) in activeQuiz.questions" :key="qIdx" class="space-y-3">
                                <div class="flex items-start gap-2">
                                    <span class="bg-slate-700 text-slate-300 text-xs px-2 py-0.5 rounded mt-1 font-mono">Q{{ qIdx + 1 }}</span>
                                    <p class="font-medium text-slate-200">{{ q.text }} <span class="text-xs text-cyan-400">({{ q.type === 'single' ? '單選題' : '複選題' }})</span></p>
                                </div>
                                <div class="grid grid-cols-1 gap-2 pl-8">
                                    <label v-for="(option, oIdx) in q.options" :key="oIdx" 
                                           :class="isOptionSelected(qIdx, oIdx) ? 'border-emerald-500/50 bg-emerald-500/5' : 'border-slate-700 hover:bg-slate-700/50'"
                                           class="border rounded-xl p-3 flex items-center cursor-pointer transition-all text-sm text-slate-300">
                                        <input :type="q.type === 'single' ? 'radio' : 'checkbox'" 
                                               :name="'q-'+qIdx" 
                                               :value="oIdx"
                                               v-model="userAnswers[qIdx]"
                                               class="mr-3 accent-emerald-500">
                                        {{ option }}
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="p-6 border-t border-slate-700 bg-slate-800/50 flex justify-between items-center">
                            <div>
                                <p v-if="quizScore !== null" class="text-emerald-400 font-bold text-lg">得分：{{ quizScore }} / 100</p>
                            </div>
                            <div class="flex gap-3">
                                <button @click="closeQuiz" class="px-4 py-2 rounded-xl text-sm font-medium text-slate-400 hover:text-white">取消</button>
                                <button @click="submitQuiz" class="px-5 py-2 rounded-xl text-sm font-medium bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold transition-all">提交答案</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <div class="fixed bottom-6 right-6 z-50">
            <button @click="isChatOpen = !isChatOpen" class="w-14 h-14 bg-gradient-to-tr from-emerald-500 to-cyan-500 rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition-all text-slate-900 text-xl font-bold">
                <i v-if="!isChatOpen" class="fa-solid fa-comments"></i>
                <i v-else class="fa-solid fa-xmark"></i>
            </button>

            <div v-if="isChatOpen" class="absolute bottom-18 right-0 w-80 bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden flex flex-col h-96">
                <div class="p-4 bg-gradient-to-r from-slate-800 to-slate-800 border-b border-slate-700 flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                    <div>
                        <h4 class="text-sm font-bold">FinBot 財金小幫手</h4>
                        <p class="text-[10px] text-slate-400">點擊下方常見問題快速對話</p>
                    </div>
                </div>
                <div class="flex-1 p-4 overflow-y-auto space-y-3 text-sm no-scrollbar">
                    <div v-for="(msg, idx) in chatHistory" :key="idx" 
                         :class="msg.role === 'user' ? 'justify-end' : 'justify-start'" class="flex">
                        <div :class="msg.role === 'user' ? 'bg-emerald-500 text-slate-900 font-medium' : 'bg-slate-700 text-slate-200'" class="max-w-[80%] rounded-2xl px-3.5 py-2 text-xs leading-relaxed">
                            {{ msg.text }}
                        </div>
                    </div>
                </div>
                <div class="p-2 border-t border-slate-700 bg-slate-900/50 flex flex-wrap gap-1">
                    <button v-for="(qa, idx) in presetQA" :key="idx" 
                            @click="askBot(qa)"
                            class="text-[11px] bg-slate-800 border border-slate-700 text-slate-300 px-2.5 py-1 rounded-full hover:border-emerald-500/50 hover:text-emerald-400 transition-all">
                        {{ qa.q }}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                // 分類資料
                const categories = ref([
                    { id: 'all', name: '全部主題', icon: 'fa-solid fa-border-all' },
                    { id: 'stock', name: '股票市場', icon: 'fa-solid fa-arrow-trend-up' },
                    { id: 'fund', name: '共同基金', icon: 'fa-solid fa-wallet' },
                    { id: 'crypto', name: '加密貨幣', icon: 'fa-brands fa-bitcoin' }
                ]);

                currentCategory = ref('all');
                currentLevel = ref('all');

                // 課程與測驗題庫數據
                const courses = ref([
                    {
                        id: 1, category: 'stock', level: '初階', time: '10 分鐘',
                        title: '第一次買股票就上手：什麼是零股？',
                        desc: '青少年資金少也不怕！學習如何用一杯飲料的錢，成為台積電或蘋果公司的微型股東。',
                        questions: [
                            { type: 'single', text: '什麼是「零股交易」？', options: ['購買不滿一張（1000股）的股票', '買路邊攤過期股票', '不用花錢的股票'], answer: 0 },
                            { type: 'multiple', text: '（複選）買股票賺錢的管道有哪些？', options: ['公司發放的股利股息', '買低賣高的價差變現', '跟銀行借錢不用還'], answer: [0, 1] }
                        ]
                    },
                    {
                        id: 2, category: 'fund', level: '初階', time: '12 分鐘',
                        title: '懶人理財術：認識 ETF 與定期定額',
                        desc: '不想天天盯盤？用 ETF 幫你一籃子買進全台灣最強的公司，分散風險最適合學生。',
                        questions: [
                            { type: 'single', text: '定期定額最大的好處是什麼？', options: ['一定發大財', '平均買進成本，分散市場波動風險', '完全沒有任何風險'], answer: 1 }
                        ]
                    },
                    {
                        id: 3, category: 'crypto', level: '進階', time: '15 分鐘',
                        title: '區塊鏈與比特幣：是未來貨幣還是泡沫？',
                        desc: '探索神秘的數位黃金。理解去中心化的概念，以及青少年該如何看待高風險的加密資產。',
                        questions: [
                            { type: 'single', text: '比特幣的總發行量上限是多少？', options: ['無限量', '2100 萬枚', '1 億枚'], answer: 1 }
                        ]
                    }
                ]);

                // 篩選後的課程
                const filteredCourses = computed(() => {
                    return courses.value.filter(c => {
                        const matchCat = currentCategory.value === 'all' || c.category === currentCategory.value;
                        const matchLvl = currentLevel.value === 'all' || c.level === currentLevel.value;
                        return matchCat && matchLvl;
                    });
                });

                // 測驗 Modal 控制
                const activeQuiz = ref(null);
                const userAnswers = ref({});
                const quizScore = ref(null);

                const startQuiz = (course) => {
                    activeQuiz.value = course;
                    quizScore.value = null;
                    // 初始化答案結構
                    userAnswers.value = course.questions.map(q => q.type === 'single' ? null : []);
                };

                const isOptionSelected = (qIdx, oIdx) => {
                    const ans = userAnswers.value[qIdx];
                    if (Array.isArray(ans)) return ans.includes(oIdx);
                    return ans === oIdx;
                };

                const submitQuiz = () => {
                    let correctCount = 0;
                    const questions = activeQuiz.value.questions;

                    questions.forEach((q, idx) => {
                        const userAns = userAnswers.value[idx];
                        if (q.type === 'single') {
                            if (userAns === q.answer) correctCount++;
                        } else {
                            // 複選題比對陣列
                            if (Array.isArray(userAns) && 
                                userAns.length === q.answer.length && 
                                userAns.every(v => q.answer.includes(v))) {
                                correctCount++;
                            }
                        }
                    });

                    quizScore.value = Math.round((correctCount / questions.length) * 100);
                };

                const closeQuiz = () => { activeQuiz.value = null; };

                // AI Chatbot 內嵌模擬數據
                const isChatOpen = ref(false);
                const chatHistory = ref([
                    { role: 'bot', text: '嗨！我是 FinBot。你想了解什麼財金小知識呢？點擊下方問題我能立刻幫你解答喔！' }
                ]);

                const presetQA = ref([
                    { q: '幾歲可以開始理財？', a: '理財不分年齡！只要開始學會管理自己的零用錢、分清「想要」與「需要」，你現在就已經在理財了。法律上現在滿 18 歲就能獨立開證券戶囉！' },
                    { q: '學生股票怎麼買？', a: '建議從「零股」和「定期定額 ETF」開始。不需萬把塊，每個月 1,000 元就能投資，分散風險也比較不會影響學業。' },
                    { q: '加密貨幣能投資嗎？', a: '加密貨幣波動極大，屬於高風險資產。對青少年來說，建議先把它當作「區塊鏈技術」來學習，千萬不要把生活費梭哈投入喔！' }
                ]);

                const askBot = (qa) => {
                    // 使用者發言
                    chatHistory.value.push({ role: 'user', text: qa.q });
                    // 模擬機器人秒回
                    setTimeout(() => {
                        chatHistory.value.push({ role: 'bot', text: qa.a });
                    }, 300);
                };

                return {
                    categories, currentCategory, currentLevel, filteredCourses,
                    activeQuiz, startQuiz, closeQuiz, userAnswers, isOptionSelected, submitQuiz, quizScore,
                    isChatOpen, chatHistory, presetQA, askBot
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
